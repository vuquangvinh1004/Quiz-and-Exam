[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short --basetemp=.tmp_pytest"
cache_dir = ".tmp_pytest_cache"
markers = [
    "slow: performance tests that take significant time (deselect with '-m not slow')",
]

[tool.coverage.run]
source = ["core", "modules"]
omit = [
    "*/migrations/*",
    "*/__pycache__/*",
    "*/tests/*",
]

[tool.coverage.report]
fail_under = 80
show_missing = true
skip_empty = true

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # do not perform function calls in default arguments
    "SIM108", # use ternary operator (can reduce readability)
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101"]  # allow assert in tests
"ui/**" = ["SLF001"]   # allow private member access in UI layer
